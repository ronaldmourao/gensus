<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genoma SUS - Cloud Sync</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="banco.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        :root {
            --color-bg-primary: #f8fafc;
            --color-text-primary: #0f172a;
            --color-card: #ffffff;
            --color-border: #e2e8f0;
        }
        [data-theme="dark"] {
            --color-bg-primary: #0f172a;
            --color-text-primary: #f1f5f9;
            --color-card: #1e293b;
            --color-border: #334155;
        }
    </style>
</head>
<body class="bg-[var(--color-bg-primary)] text-[var(--color-text-primary)] transition-colors duration-300">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSunO3dVP4m3_zA1WIBxLQCMDvwPD2gqJTX0DbyYCvR21DnDO2kNeJSLKgmOaIfRXWKFo5asfzR6SM5/pub?output=csv";

        const Icons = {
            Trophy: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>,
            User: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>,
            LogOut: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" cy="12" x2="9" y2="12"></line></svg>,
            Plus: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>,
            Play: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>,
            BarChart: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></svg>,
            BookX: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/><line x1="9" y1="8" x2="15" y2="14"/><line x1="15" y1="8" x2="9" y2="14"/></svg>,
            Zap: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>,
            Target: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>,
            Brain: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96.44 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 1.98-3A2.5 2.5 0 0 1 9.5 2Z"/><path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96.44 2.5 2.5 0 0 0 2.96-3.08 3 3 0 0 0 .34-5.58 2.5 2.5 0 0 0-1.32-4.24 2.5 2.5 0 0 0-1.98-3A2.5 2.5 0 0 0 14.5 2Z"/></svg>,
            Moon: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>,
            Sun: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>,
            Check: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="20 6 9 17 4 12"/></svg>,
            AlertCircle: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>,
            Loader: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10" opacity="0.3"/><path d="M12 2a10 10 0 0 1 0 20" strokeDasharray="15.7 31.4" style={{animation: 'spin 1s linear infinite'}}/></svg>,
        };

        const themeColors = {
            "Laboratório": { bg: "dark:bg-emerald-900/30 bg-emerald-50", text: "dark:text-emerald-300 text-emerald-700", border: "dark:border-emerald-700 border-emerald-200", bar: "bg-emerald-500", highlight: "dark:bg-emerald-700 bg-emerald-600" },
            "Bioinformática": { bg: "dark:bg-blue-900/30 bg-blue-50", text: "dark:text-blue-300 text-blue-700", border: "dark:border-blue-700 border-blue-200", bar: "bg-blue-500", highlight: "dark:bg-blue-700 bg-blue-600" }
        };
        const getTheme = (area) => themeColors[area] || { bg: "dark:bg-slate-800 bg-slate-50", text: "dark:text-slate-300 text-slate-700", border: "dark:border-slate-700 border-slate-200", bar: "bg-slate-500", highlight: "dark:bg-slate-700 bg-slate-600" };

        const difficultyStyles = {
            "fácil": { bg: "dark:bg-green-900/30 bg-green-100", text: "dark:text-green-300 text-green-700", icon: Icons.Zap, label: "Fácil" },
            "médio": { bg: "dark:bg-yellow-900/30 bg-yellow-100", text: "dark:text-yellow-300 text-yellow-700", icon: Icons.Target, label: "Médio" },
            "difícil": { bg: "dark:bg-red-900/30 bg-red-100", text: "dark:text-red-300 text-red-700", icon: Icons.Brain, label: "Difícil" }
        };
        const getDifficultyStyle = (diff) => difficultyStyles[diff] || difficultyStyles["fácil"];

        const editalSyllabus = {
            "Laboratório": [
                "Biologia, biologia molecular e genética",
                "Tecnologias laboratoriais em genômica (sequenciamento de nova geração - NGS, extração de DNA genômico, controle de qualidade, preparo de amostras)",
                "Boas Práticas de Laboratório (BPL), biossegurança e controle de qualidade",
                "Ética em pesquisa e noções de estudos multicêntricos",
                "Noções de saúde pública e ética em pesquisa"
            ],
            "Bioinformática": [
                "Bioinformática e análise genômica",
                "Programação e ferramentas computacionais",
                "Estatística aplicada à genômica",
                "Princípios de saúde pública e epidemiologia genética",
                "Segurança de dados",
                "Genética de populações",
                "Vocabulários controlados, ontologias e técnicas de extração, transformação e carga de dados (ETL)"
            ]
        };

        const App = () => {
            const [currentUser, setCurrentUser] = useState(() => localStorage.getItem('genomasus_active_user'));
            const [userList, setUserList] = useState(() => JSON.parse(localStorage.getItem('genomasus_user_list') || "[]"));
            const [showNewUserForm, setShowNewUserForm] = useState(false);
            const [loginInput, setLoginInput] = useState('');
            const [screen, setScreen] = useState('dashboard');
            const [quizConfig, setQuizConfig] = useState({ questions: [], title: "", mode: "study" });
            const [idx, setIdx] = useState(0);
            const [history, setHistory] = useState({});
            const [sessionAnswers, setSessionAnswers] = useState({});
            const [darkMode, setDarkMode] = useState(() => localStorage.getItem('genomasus_dark_mode') === 'true');
            const [syncStatus, setSyncStatus] = useState('idle'); // idle, syncing, success, error
            const [syncMessage, setSyncMessage] = useState('');
            const [showDifficultySelector, setShowDifficultySelector] = useState(false);
            const [pendingQuizData, setPendingQuizData] = useState(null);
            const [lastSyncTime, setLastSyncTime] = useState(null);

            const activeBank = useMemo(() => window.questionBank || [], []);

            // Atualizar dark mode no documento
            useEffect(() => {
                if (darkMode) {
                    document.documentElement.setAttribute('data-theme', 'dark');
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.removeAttribute('data-theme');
                    document.documentElement.classList.remove('dark');
                }
                localStorage.setItem('genomasus_dark_mode', darkMode);
            }, [darkMode]);

            const syncFromCloud = async (userName, showMessage = true) => {
                if (!CSV_URL) return;
                setSyncStatus('syncing');
                if (showMessage) setSyncMessage('Sincronizando com a nuvem...');
                
                try {
                    const response = await fetch(CSV_URL + "&t=" + new Date().getTime());
                    const text = await response.text();
                    const rows = text.split('\n').map(row => row.split(','));
                    
                    const newHistory = {};
                    rows.slice(1).forEach(row => {
                        const rowUser = row[1]?.replace(/"/g, '').trim().toLowerCase();
                        const rowId = parseInt(row[2]?.replace(/"/g, ''));
                        const rowStatus = row[3]?.replace(/"/g, '').trim();

                        if (rowUser === userName.toLowerCase() && !isNaN(rowId)) {
                            if (!newHistory[rowId]) newHistory[rowId] = [];
                            newHistory[rowId].push({ ans: "?", isCorrect: rowStatus === "ACERTO", date: row[0] });
                        }
                    });
                    setHistory(newHistory);
                    setSyncStatus('success');
                    if (showMessage) setSyncMessage('✅ Sincronizado com sucesso!');
                    setLastSyncTime(new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' }));
                    setTimeout(() => setSyncStatus('idle'), 3000);
                } catch (e) {
                    console.error("Erro de sincronização", e);
                    setSyncStatus('error');
                    setSyncMessage('❌ Erro ao sincronizar. Tentando novamente...');
                    setTimeout(() => setSyncStatus('idle'), 5000);
                }
            };

            // Sincronização automática a cada 30 segundos
            useEffect(() => {
                if (!currentUser) return;
                
                // Sincronizar ao fazer login
                syncFromCloud(currentUser, false);
                
                // Sincronizar a cada 30 segundos
                const interval = setInterval(() => {
                    syncFromCloud(currentUser, false);
                }, 30000);

                return () => clearInterval(interval);
            }, [currentUser]);

            // Sincronização ao fazer uma resposta
            const syncAnswerToCloud = async (userName, qId, statusText) => {
                try {
                    const formID = "1FAIpQLSdLep-1NlhMCXeeGEVjZPXh-unPvuSkwqkNvfAuYwyCPDKzSw";
                    const formData = new URLSearchParams();
                    formData.append("entry.369347060", userName);
                    formData.append("entry.455774683", qId);
                    formData.append("entry.1700459455", statusText);

                    const response = await fetch(`https://docs.google.com/forms/d/e/${formID}/formResponse`, {
                        method: 'POST',
                        mode: 'no-cors',
                        body: formData
                    });
                    
                    setSyncStatus('success');
                    setSyncMessage('✅ Resposta sincronizada');
                    setLastSyncTime(new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' }));
                    setTimeout(() => setSyncStatus('idle'), 2000);
                    
                    return true;
                } catch (e) {
                    console.error("Erro ao enviar resposta", e);
                    setSyncStatus('error');
                    setSyncMessage('⚠️ Resposta salva localmente. Sincronizará quando conectado.');
                    setTimeout(() => setSyncStatus('idle'), 3000);
                    return false;
                }
            };

            useEffect(() => {
                if (currentUser) {
                    if (!userList.includes(currentUser)) {
                        const newList = [...userList, currentUser];
                        setUserList(newList);
                        localStorage.setItem('genomasus_user_list', JSON.stringify(newList));
                    }
                }
            }, [currentUser]);

            const handleLogin = (name) => {
                const formatted = name.trim().toLowerCase();
                if (formatted) {
                    localStorage.setItem('genomasus_active_user', formatted);
                    setCurrentUser(formatted);
                }
            };

            const handleLogout = () => {
                localStorage.removeItem('genomasus_active_user');
                setCurrentUser(null);
                setScreen('dashboard');
            };

            const handleAnswer = (qId, option) => {
                if (sessionAnswers[qId]) return;
                const question = activeBank.find(q => q.id === qId);
                const isCorrect = question.correct === option;
                const statusText = isCorrect ? "ACERTO" : "ERRO";

                setSessionAnswers(prev => ({ ...prev, [qId]: option }));
                setHistory(prev => {
                    const qHist = prev[qId] || [];
                    return { ...prev, [qId]: [...qHist, { ans: option, isCorrect, date: new Date().toISOString() }] };
                });

                // Sincronizar com feedback
                syncAnswerToCloud(currentUser, qId, statusText);
            };

            const startQuiz = (questions, title, mode) => {
                if(questions.length === 0) return alert("Nenhuma questão disponível para este filtro.");
                setQuizConfig({ questions: [...questions].sort(() => 0.5 - Math.random()), title, mode });
                setSessionAnswers({});
                setIdx(0);
                setScreen('quiz');
                setShowDifficultySelector(false);
                setPendingQuizData(null);
            };

            const openDifficultySelector = (questions, title, mode) => {
                if(questions.length === 0) return alert("Nenhuma questão disponível para este filtro.");
                setPendingQuizData({ questions, title, mode });
                setShowDifficultySelector(true);
            };

            const startQuizWithDifficulty = (difficulty) => {
                if (!pendingQuizData) return;
                const filteredQuestions = difficulty === 'all' 
                    ? pendingQuizData.questions 
                    : pendingQuizData.questions.filter(q => q.difficulty === difficulty);
                
                if (filteredQuestions.length === 0) {
                    alert(`Nenhuma questão ${difficulty === 'all' ? '' : difficulty} disponível para este filtro.`);
                    return;
                }
                
                startQuiz(filteredQuestions, pendingQuizData.title, pendingQuizData.mode);
            };

            const cadernoStatus = useMemo(() => {
                const status = {};
                Object.keys(history).forEach(qId => {
                    const att = history[qId];
                    if (!att || att.length === 0) return;
                    const last = att[att.length - 1];
                    const prev = att.length > 1 ? att[att.length - 2] : null;
                    if (!last.isCorrect) status[qId] = "red";
                    else if (last.isCorrect && (!prev || !prev.isCorrect)) status[qId] = "yellow";
                    else status[qId] = "green";
                });
                return status;
            }, [history]);

            const errorQuestions = activeBank.filter(q => cadernoStatus[q.id] === 'red' || cadernoStatus[q.id] === 'yellow');

            const subjectsData = useMemo(() => {
                const map = {};
                activeBank.forEach(q => {
                    if (!map[q.subject]) map[q.subject] = { total: 0, attempted: 0, correct: 0, area: q.area, questions: [] };
                    map[q.subject].total++;
                    map[q.subject].questions.push(q);
                    const h = history[q.id];
                    if (h && h.length > 0) {
                        map[q.subject].attempted++;
                        if (h[h.length - 1].isCorrect) map[q.subject].correct++;
                    }
                });
                return map;
            }, [history, activeBank]);

            const difficultyStats = useMemo(() => {
                const stats = {
                    global: { fácil: {total: 0, attempted: 0, correct: 0}, médio: {total: 0, attempted: 0, correct: 0}, difícil: {total: 0, attempted: 0, correct: 0} },
                    byArea: {}
                };

                activeBank.forEach(q => {
                    const diff = q.difficulty || 'fácil';
                    const area = q.area;
                    
                    if (!stats.global[diff]) stats.global[diff] = {total: 0, attempted: 0, correct: 0};
                    stats.global[diff].total++;
                    
                    if (!stats.byArea[area]) {
                        stats.byArea[area] = { fácil: {total: 0, attempted: 0, correct: 0}, médio: {total: 0, attempted: 0, correct: 0}, difícil: {total: 0, attempted: 0, correct: 0} };
                    }
                    if (!stats.byArea[area][diff]) stats.byArea[area][diff] = {total: 0, attempted: 0, correct: 0};
                    stats.byArea[area][diff].total++;
                    
                    const h = history[q.id];
                    if (h && h.length > 0) {
                        stats.global[diff].attempted++;
                        stats.byArea[area][diff].attempted++;
                        
                        if (h[h.length - 1].isCorrect) {
                            stats.global[diff].correct++;
                            stats.byArea[area][diff].correct++;
                        }
                    }
                });

                return stats;
            }, [history, activeBank]);

            // STATUS BAR COM SINCRONIZAÇÃO
            const SyncIndicator = () => {
                return (
                    <div className={`fixed bottom-4 right-4 md:bottom-6 md:right-6 px-4 py-3 rounded-full border backdrop-blur-sm text-xs font-bold transition-all z-40 ${
                        syncStatus === 'idle' ? 'opacity-0 pointer-events-none' :
                        syncStatus === 'syncing' ? 'bg-blue-500/90 dark:bg-blue-600/90 border-blue-400 text-white' :
                        syncStatus === 'success' ? 'bg-green-500/90 dark:bg-green-600/90 border-green-400 text-white' :
                        'bg-red-500/90 dark:bg-red-600/90 border-red-400 text-white'
                    }`}>
                        <div className="flex items-center gap-2">
                            {syncStatus === 'syncing' && <Icons.Loader />}
                            {syncStatus === 'success' && <Icons.Check />}
                            {syncStatus === 'error' && <Icons.AlertCircle />}
                            <span>{syncMessage}</span>
                        </div>
                    </div>
                );
            };

            if (!currentUser) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-slate-100 dark:bg-slate-900 p-4">
                        <div className="bg-white dark:bg-slate-800 p-8 md:p-10 rounded-[3rem] shadow-2xl w-full max-w-md border dark:border-slate-700 border-slate-200">
                            <div className="bg-blue-600 dark:bg-blue-700 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-6 text-white shadow-lg"><Icons.Trophy /></div>
                            <h1 className="text-3xl font-black text-center text-slate-800 dark:text-white mb-2 tracking-tighter">Genoma SUS</h1>
                            <p className="text-center text-slate-500 dark:text-slate-400 text-sm mb-8">Plataforma de Estudos</p>
                            
                            <div className="space-y-2 mb-8 max-h-60 overflow-y-auto pr-2 hide-scrollbar">
                                {userList.map(user => (
                                    <button key={user} onClick={() => handleLogin(user)} className="w-full flex items-center gap-3 p-3 md:p-4 rounded-2xl bg-slate-50 dark:bg-slate-700 hover:bg-blue-50 dark:hover:bg-slate-600 border-2 border-transparent hover:border-blue-200 dark:hover:border-blue-600 transition-all group">
                                        <div className="p-2 bg-white dark:bg-slate-600 rounded-xl text-slate-400 dark:text-slate-300 group-hover:text-blue-500 dark:group-hover:text-blue-400 shadow-sm"><Icons.User /></div>
                                        <span className="font-bold text-slate-700 dark:text-white capitalize text-sm md:text-base">{user}</span>
                                    </button>
                                ))}
                            </div>
                            {!showNewUserForm ? (
                                <button onClick={() => setShowNewUserForm(true)} className="w-full py-3 md:py-4 rounded-2xl border-2 border-dashed border-slate-300 dark:border-slate-600 text-slate-500 dark:text-slate-400 font-bold hover:bg-slate-50 dark:hover:bg-slate-700 flex items-center justify-center gap-2 transition-all text-sm md:text-base">
                                    <Icons.Plus /> Novo Aluno
                                </button>
                            ) : (
                                <form onSubmit={(e) => { e.preventDefault(); handleLogin(loginInput); }} className="animate-in slide-in-from-bottom-2">
                                    <input autoFocus className="w-full p-3 md:p-4 rounded-2xl bg-slate-50 dark:bg-slate-700 border-2 border-blue-500 dark:border-blue-600 outline-none font-bold text-sm md:text-base mb-3 dark:text-white" placeholder="Seu nome..." value={loginInput} onChange={e => setLoginInput(e.target.value)} />
                                    <div className="flex gap-2">
                                        <button type="submit" className="flex-1 bg-blue-600 dark:bg-blue-700 text-white font-black py-3 md:py-4 rounded-2xl shadow-lg hover:bg-blue-700 dark:hover:bg-blue-600 text-sm md:text-base">Criar</button>
                                        <button type="button" onClick={() => setShowNewUserForm(false)} className="px-4 md:px-6 bg-slate-200 dark:bg-slate-700 text-slate-600 dark:text-slate-300 font-bold rounded-2xl">X</button>
                                    </div>
                                </form>
                            )}

                            <button 
                                onClick={() => setDarkMode(!darkMode)} 
                                className="mt-6 w-full flex items-center justify-center gap-2 py-2 px-4 rounded-xl bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 text-sm font-bold hover:bg-slate-200 dark:hover:bg-slate-600 transition-all"
                            >
                                {darkMode ? <Icons.Sun /> : <Icons.Moon />}
                                {darkMode ? 'Modo Claro' : 'Modo Escuro'}
                            </button>
                        </div>
                    </div>
                );
            }

            const DifficultySelector = () => {
                if (!showDifficultySelector || !pendingQuizData) return null;
                
                const countByDiff = {
                    all: pendingQuizData.questions.length,
                    fácil: pendingQuizData.questions.filter(q => q.difficulty === 'fácil').length,
                    médio: pendingQuizData.questions.filter(q => q.difficulty === 'médio').length,
                    difícil: pendingQuizData.questions.filter(q => q.difficulty === 'difícil').length
                };

                return (

                                const accuracy = data.attempted > 0 ? Math.round((data.correct / data.attempted) * 100) : 0;
                                
                                return (
                                    <div key={name} className="p-4 md:p-6 border-2 dark:border-slate-700 border-slate-50 rounded-[2rem] bg-slate-50/30 dark:bg-slate-700/20 flex flex-col md:flex-row md:items-center gap-4 md:gap-6 group hover:bg-white dark:hover:bg-slate-700 hover:border-blue-100 dark:hover:border-blue-600 transition-all">
                                        <div className="flex-1 min-w-0">
                                            <span className="text-[10px] font-black uppercase text-slate-400 dark:text-slate-500 tracking-[0.2em] block mb-1">{data.area}</span>
                                            <h4 className="font-bold text-slate-800 dark:text-white leading-tight mb-3 text-sm md:text-base line-clamp-2">{name}</h4>
                                            <div className="flex gap-4 md:gap-6">
                                                <div>
                                                    <span className="text-[10px] font-bold text-slate-400 dark:text-slate-500 uppercase block">Cobertura</span>
                                                    <span className={`text-lg md:text-lg font-black ${coverage > 80 ? 'text-green-500' : 'text-orange-500'}`}>{coverage}%</span>
                                                </div>
                                                <div>
                                                    <span className="text-[10px] font-bold text-slate-400 dark:text-slate-500 uppercase block">Acerto</span>
                                                    <span className={`text-lg md:text-lg font-black ${accuracy > 70 ? 'text-blue-600 dark:text-blue-400' : 'text-red-500'}`}>{accuracy}%</span>
                                                </div>
                                            </div>
                                        </div>
                                        
                                        <div className="flex gap-2 flex-shrink-0">
                                            <button onClick={() => startQuiz(data.questions.filter(q => !history[q.id]), "Inéditas: " + name, "study")} className="flex-1 md:flex-none px-4 md:px-6 py-2 md:py-3 bg-slate-900 dark:bg-slate-700 text-white text-xs font-black rounded-2xl hover:bg-slate-700 dark:hover:bg-slate-600 shadow-md whitespace-nowrap">SÓ INÉDITAS</button>
                                            <button onClick={() => startQuiz(data.questions.filter(q => history[q.id] && !history[q.id][history[q.id].length-1].isCorrect), "Revisar Erros: " + name, "study")} className="flex-1 md:flex-none px-4 md:px-6 py-2 md:py-3 bg-red-100 dark:bg-red-900/30 text-red-600 dark:text-red-400 text-xs font-black rounded-2xl hover:bg-red-200 dark:hover:bg-red-900/50">SÓ ERROS</button>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen dark:bg-slate-900 bg-slate-50 transition-colors">
                    <DifficultySelector />
                    <SyncIndicator />
                    {screen === 'dashboard' && <Dashboard />}
                    {screen === 'quiz' && <Quiz />}
                    {screen === 'estatisticas' && <Estatisticas />}
                    {screen === 'caderno' && (
                        <div className="max-w-4xl mx-auto p-4 md:p-8 animate-in slide-in-from-bottom-4">
                            <button onClick={() => setScreen('dashboard')} className="mb-6 md:mb-8 font-bold text-slate-400 dark:text-slate-500 hover:text-slate-900 dark:hover:text-white text-sm md:text-base">← Voltar</button>
                            <div className="bg-white dark:bg-slate-800 p-6 md:p-10 rounded-[3rem] shadow-xl border dark:border-slate-700 border-slate-200">
                                <h2 className="text-2xl md:text-3xl font-black text-slate-800 dark:text-white mb-6 md:mb-8 uppercase tracking-tighter">Revisão na Nuvem</h2>
                                <button disabled={errorQuestions.length === 0} onClick={() => startQuiz(errorQuestions, "Revisão", "study")} className="w-full py-4 md:py-5 bg-red-600 dark:bg-red-700 text-white font-black rounded-2xl shadow-xl hover:bg-red-700 dark:hover:bg-red-600 transition-all disabled:opacity-50 disabled:cursor-not-allowed text-sm md:text-base">REVISAR ERROS ({errorQuestions.length})</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

    <style>
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</body>
</html>
