<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genoma SUS Quiz - Edital Exato</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .toggle-checkbox:checked { right: 0; border-color: #2563EB; }
        .toggle-checkbox:checked + .toggle-label { background-color: #2563EB; }
    </style>
</head>
<body class="bg-[#f8fafc] text-slate-900">
    <div id="root"></div>

    <!-- O BANCO DE QUESTÕES DEVE SER CARREGADO AQUI DENTRO DO BODY -->
    <script src="banco.js"></script>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // --- ÍCONES (SVG Inline) ---
        const Icons = {
            Trophy: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>,
            Check: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>,
            Cross: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>,
            Star: (filled) => <svg width="24" height="24" viewBox="0 0 24 24" fill={filled ? "currentColor" : "none"} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>,
            BookX: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/><line x1="9" y1="8" x2="15" y2="14"/><line x1="15" y1="8" x2="9" y2="14"/></svg>,
            Play: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>,
            Filter: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>,
            BarChart: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></svg>
        };

        // --- CORES TEMÁTICAS ---
        const themeColors = {
            "Laboratório": { bg: "bg-emerald-50", text: "text-emerald-700", border: "border-emerald-200", bar: "bg-emerald-500", highlight: "bg-emerald-600" },
            "Bioinformática": { bg: "bg-blue-50", text: "text-blue-700", border: "border-blue-200", bar: "bg-blue-500", highlight: "bg-blue-600" }
        };
        const getTheme = (area) => themeColors[area] || { bg: "bg-slate-50", text: "text-slate-700", border: "border-slate-200", bar: "bg-slate-500", highlight: "bg-slate-600" };

        // --- EDITAL OFICIAL ---
        const editalSyllabus = {
            "Laboratório": [
                "Biologia, biologia molecular e genética",
                "Tecnologias laboratoriais em genômica (sequenciamento de nova geração - NGS, extração de DNA genômico, controle de qualidade, preparo de amostras)",
                "Boas Práticas de Laboratório (BPL), biossegurança e controle de qualidade",
                "Ética em pesquisa e noções de estudos multicêntricos",
                "Noções de saúde pública e ética em pesquisa"
            ],
            "Bioinformática": [
                "Bioinformática e análise genômica",
                "Programação e ferramentas computacionais",
                "Estatística aplicada à genômica",
                "Princípios de saúde pública e epidemiologia genética",
                "Segurança de dados",
                "Genética de populações",
                "Vocabulários controlados, ontologias e técnicas de extração, transformação e carga de dados (ETL)"
            ]
        };

        const App = () => {
            const [screen, setScreen] = useState('dashboard');
            const [quizConfig, setQuizConfig] = useState({ questions: [], title: "", mode: "study" });
            const [idx, setIdx] = useState(0);
            
            const [history, setHistory] = useState(() => JSON.parse(localStorage.getItem('genomasus_vfinal_hist') || '{}'));
            const [flagged, setFlagged] = useState(() => JSON.parse(localStorage.getItem('genomasus_vfinal_flg') || '[]'));
            const [sessionAnswers, setSessionAnswers] = useState({});
            
            const [hideAnswered, setHideAnswered] = useState(false);

            useEffect(() => {
                localStorage.setItem('genomasus_vfinal_hist', JSON.stringify(history));
                localStorage.setItem('genomasus_vfinal_flg', JSON.stringify(flagged));
            }, [history, flagged]);

            const cadernoStatus = useMemo(() => {
                const status = {};
                Object.keys(history).forEach(qId => {
                    const attempts = history[qId];
                    if (!attempts || attempts.length === 0) return;
                    const last = attempts[attempts.length - 1];
                    const prev = attempts.length > 1 ? attempts[attempts.length - 2] : null;

                    if (!last.isCorrect) status[qId] = "red";
                    else if (last.isCorrect && (!prev || !prev.isCorrect)) status[qId] = "yellow";
                    else if (last.isCorrect && prev.isCorrect) status[qId] = "green";
                });
                return status;
            }, [history]);

            // AQUI O APP ACESSA A VARIÁVEL DA JANELA (window) DO ARQUIVO banco.js
            const activeBank = window.questionBank || [];
            
            const errorQuestions = activeBank.filter(q => cadernoStatus[q.id] === 'red' || cadernoStatus[q.id] === 'yellow');

            const handleAnswer = (qId, option) => {
                if (sessionAnswers[qId] && quizConfig.mode === 'study') return;
                const question = quizConfig.questions.find(q => q.id === qId);
                const isCorrect = question.correct === option;

                setSessionAnswers(prev => ({ ...prev, [qId]: option }));
                setHistory(prev => {
                    const qHist = prev[qId] || [];
                    return { ...prev, [qId]: [...qHist, { ans: option, isCorrect, date: new Date().toISOString() }] };
                });
            };

            const startQuiz = (questions, title, mode) => {
                let toSolve = [...questions];
                if (hideAnswered) {
                    toSolve = toSolve.filter(q => !history[q.id] || history[q.id].length === 0);
                }

                if (toSolve.length === 0) {
                    alert("Você já resolveu todas as questões desse filtro! Desmarque 'Ocultar resolvidas' para refazê-las.");
                    return;
                }

                setQuizConfig({ questions: toSolve.sort(() => 0.5 - Math.random()), title, mode });
                setSessionAnswers({});
                setIdx(0);
                setScreen('quiz');
            };

            const toggleFlag = (id) => setFlagged(prev => prev.includes(id) ? prev.filter(i => i !== id) : [...prev, id]);

            // ---- DASHBOARD ----
            const Dashboard = () => {
                const getAreaProgress = (areaName) => {
                    const areaQs = activeBank.filter(q => q.area === areaName);
                    if (areaQs.length === 0) return { ans: 0, tot: 0, pct: 0 };
                    const ans = areaQs.filter(q => history[q.id] && history[q.id].length > 0).length;
                    return { ans, tot: areaQs.length, pct: Math.round((ans/areaQs.length)*100) };
                };
                const getSubjectProgress = (areaName, subjName) => {
                    const subjQs = activeBank.filter(q => q.area === areaName && q.subject === subjName);
                    const ans = subjQs.filter(q => history[q.id] && history[q.id].length > 0).length;
                    return { ans, tot: subjQs.length };
                };

                return (
                    <div className="max-w-7xl mx-auto p-4 md:p-8 animate-in fade-in">
                        <header className="mb-8 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                            <div>
                                <div className="flex items-center gap-3 mb-2">
                                    <div className="bg-slate-900 p-2.5 rounded-xl text-white"><Icons.Trophy /></div>
                                    <h1 className="text-2xl md:text-3xl font-black tracking-tighter text-slate-900">GENOMA SUS <span className="text-blue-600">Edital Exato</span></h1>
                                </div>
                                <p className="text-slate-500 font-medium">Estruturado rigorosamente nas duas categorias do certame.</p>
                            </div>
                            
                            <div className="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm flex items-center gap-3">
                                <Icons.Filter />
                                <div className="flex flex-col">
                                    <span className="font-bold text-slate-700 text-sm">Ocultar resolvidas</span>
                                    <span className="text-[10px] text-slate-400">Focar em questões inéditas</span>
                                </div>
                                <div className="ml-4 relative inline-block w-12 mr-2 align-middle select-none transition duration-200 ease-in">
                                    <input type="checkbox" name="toggle" id="toggle" checked={hideAnswered} onChange={() => setHideAnswered(!hideAnswered)} className="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 appearance-none cursor-pointer z-10 transition-all duration-300"/>
                                    <label htmlFor="toggle" className="toggle-label block overflow-hidden h-6 rounded-full bg-slate-300 cursor-pointer transition-colors duration-300"></label>
                                </div>
                            </div>
                        </header>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10">
                            <button onClick={() => setScreen('caderno')} className="w-full bg-red-50 hover:bg-red-100 border border-red-200 rounded-[2rem] p-6 transition-all flex justify-between items-center group">
                                <div className="flex items-center gap-4">
                                    <div className="p-3 bg-red-500 text-white rounded-xl shadow-lg"><Icons.BookX /></div>
                                    <div className="text-left">
                                        <h2 className="text-xl font-black text-red-900">Caderno de Erros</h2>
                                        <p className="text-red-700 font-medium">{errorQuestions.length} questões para revisar</p>
                                    </div>
                                </div>
                                <span className="text-red-600 font-bold hidden md:block group-hover:translate-x-2 transition-transform">Abrir Caderno →</span>
                            </button>

                            <button onClick={() => setScreen('estatisticas')} className="w-full bg-blue-50 hover:bg-blue-100 border border-blue-200 rounded-[2rem] p-6 transition-all flex justify-between items-center group">
                                <div className="flex items-center gap-4">
                                    <div className="p-3 bg-blue-500 text-white rounded-xl shadow-lg"><Icons.BarChart /></div>
                                    <div className="text-left">
                                        <h2 className="text-xl font-black text-blue-900">Desempenho</h2>
                                        <p className="text-blue-700 font-medium">Estatísticas gerais e por disciplina</p>
                                    </div>
                                </div>
                                <span className="text-blue-600 font-bold hidden md:block group-hover:translate-x-2 transition-transform">Ver Dados →</span>
                            </button>
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                            {Object.entries(editalSyllabus).map(([area, subjects]) => {
                                const theme = getTheme(area);
                                const areaProg = getAreaProgress(area);
                                
                                return (
                                    <div key={area} className="bg-white rounded-[2rem] border border-slate-200 shadow-sm overflow-hidden flex flex-col">
                                        <div className={`${theme.bg} p-6 border-b ${theme.border}`}>
                                            <div className="flex justify-between items-start mb-2">
                                                <h2 className={`text-2xl font-black ${theme.text} tracking-tight uppercase`}>
                                                    {area === 'Laboratório' ? 'Prova 3: ' : 'Prova 1: '}{area}
                                                </h2>
                                                <span className="bg-white text-slate-600 text-xs font-bold px-3 py-1.5 rounded-full shadow-sm">{areaProg.ans}/{areaProg.tot}</span>
                                            </div>
                                            <button onClick={() => startQuiz(activeBank.filter(q => q.area === area), `Simulado Geral: ${area}`, 'study')} className={`mt-4 w-full py-3 ${theme.highlight} text-white font-bold rounded-xl shadow-md hover:opacity-90 transition flex items-center justify-center gap-2`}>
                                                <Icons.Play /> Resolver Categoria Completa
                                            </button>
                                        </div>

                                        <div className="p-2 flex-1">
                                            {subjects.map(subj => {
                                                const sProg = getSubjectProgress(area, subj);
                                                const hasQuestionsInBank = sProg.tot > 0;
                                                
                                                return (
                                                    <div key={subj} className="group flex items-center justify-between p-4 hover:bg-slate-50 rounded-xl transition border-b border-slate-100 last:border-0">
                                                        <div className="pr-4 flex-1">
                                                            <h4 className="text-sm font-bold text-slate-700 leading-snug">{subj}</h4>
                                                            <span className="text-[10px] uppercase font-bold text-slate-400 tracking-widest">{sProg.ans}/{sProg.tot} QUESTÕES</span>
                                                        </div>
                                                        <button disabled={!hasQuestionsInBank} onClick={() => startQuiz(activeBank.filter(q => q.area === area && q.subject === subj), "Estudo: " + subj.substring(0,25)+"...", 'study')} className={`shrink-0 px-4 py-2 rounded-lg text-xs font-bold transition ${hasQuestionsInBank ? 'bg-slate-900 text-white hover:bg-slate-700' : 'bg-slate-100 text-slate-300 cursor-not-allowed'}`}>
                                                            {hasQuestionsInBank ? 'Estudar' : 'Adicionar depois'}
                                                        </button>
                                                    </div>
                                                )
                                            })}
                                        </div>
                                    </div>
                                )
                            })}
                        </div>
                    </div>
                );
            };

            // ---- ESTATÍSTICAS ----
            const Estatisticas = () => {
                const stats = useMemo(() => {
                    const s = { overall: { correct: 0, wrong: 0, total: 0 }, areas: {}, subjects: {} };
                    activeBank.forEach(q => {
                        const qHistory = history[q.id];
                        if (qHistory && qHistory.length > 0) {
                            const lastAttempt = qHistory[qHistory.length - 1];
                            const isCorrect = lastAttempt.isCorrect;

                            s.overall.total++;
                            if (isCorrect) s.overall.correct++; else s.overall.wrong++;

                            if (!s.areas[q.area]) s.areas[q.area] = { correct: 0, wrong: 0, total: 0 };
                            s.areas[q.area].total++;
                            if (isCorrect) s.areas[q.area].correct++; else s.areas[q.area].wrong++;

                            if (!s.subjects[q.subject]) s.subjects[q.subject] = { area: q.area, correct: 0, wrong: 0, total: 0 };
                            s.subjects[q.subject].total++;
                            if (isCorrect) s.subjects[q.subject].correct++; else s.subjects[q.subject].wrong++;
                        }
                    });
                    return s;
                }, [history]);

                const overallPct = stats.overall.total > 0 ? Math.round((stats.overall.correct / stats.overall.total) * 100) : 0;

                return (
                    <div className="max-w-6xl mx-auto p-4 md:p-8 animate-in slide-in-from-bottom-4">
                        <button onClick={() => setScreen('dashboard')} className="text-slate-500 font-bold mb-6 hover:text-slate-800 flex items-center gap-2">← Voltar ao Painel</button>

                        <div className="bg-white p-6 md:p-10 rounded-[2.5rem] border border-slate-200 shadow-sm mb-8">
                            <div className="flex items-center gap-4 mb-8">
                                <div className="p-4 bg-blue-100 text-blue-600 rounded-2xl"><Icons.BarChart /></div>
                                <div><h1 className="text-2xl font-black text-slate-800">Estatísticas</h1><p className="text-slate-500 font-medium">Acompanhe seu desempenho geral.</p></div>
                            </div>

                            <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-10">
                                <div className="bg-slate-50 p-6 rounded-2xl border border-slate-100"><span className="text-slate-500 text-xs font-black uppercase block mb-1">Respondidas</span><span className="text-3xl font-black text-slate-800">{stats.overall.total}</span></div>
                                <div className="bg-green-50 p-6 rounded-2xl border border-green-100"><span className="text-green-600 text-xs font-black uppercase block mb-1">Acertos</span><span className="text-3xl font-black text-green-700">{stats.overall.correct}</span></div>
                                <div className="bg-red-50 p-6 rounded-2xl border border-red-100"><span className="text-red-600 text-xs font-black uppercase block mb-1">Erros</span><span className="text-3xl font-black text-red-700">{stats.overall.wrong}</span></div>
                                <div className="bg-blue-50 p-6 rounded-2xl border border-blue-100"><span className="text-blue-600 text-xs font-black uppercase block mb-1">Precisão Média</span><span className="text-3xl font-black text-blue-700">{overallPct}%</span></div>
                            </div>

                            <h2 className="text-lg font-black uppercase tracking-widest text-slate-800 mb-4">Por Categoria (Prova)</h2>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10">
                                {Object.entries(stats.areas).map(([area, data]) => {
                                    const theme = getTheme(area);
                                    const pct = Math.round((data.correct / data.total) * 100) || 0;
                                    return (
                                        <div key={area} className={`p-6 rounded-2xl border ${theme.border} ${theme.bg}`}>
                                            <h3 className={`font-black text-lg ${theme.text} mb-4 uppercase`}>{area}</h3>
                                            <div className="flex justify-between items-end mb-2">
                                                <span className={`text-4xl font-black ${theme.text}`}>{pct}%</span>
                                                <div className="text-right">
                                                    <span className="text-xs font-bold text-slate-500 block">Acertos: {data.correct}</span>
                                                    <span className="text-xs font-bold text-slate-400 block">Erros: {data.wrong}</span>
                                                </div>
                                            </div>
                                            <div className="w-full h-2 bg-white/60 rounded-full overflow-hidden mt-3">
                                                <div className={`h-full ${theme.bar}`} style={{width: `${pct}%`}}></div>
                                            </div>
                                        </div>
                                    )
                                })}
                            </div>

                            {Object.keys(stats.subjects).length > 0 && (
                                <div>
                                    <h2 className="text-lg font-black uppercase tracking-widest text-slate-800 mb-4">Por Assunto Analítico</h2>
                                    <div className="space-y-4">
                                        {Object.entries(stats.subjects).sort((a, b) => b[1].total - a[1].total).map(([subj, data]) => {
                                            const pct = Math.round((data.correct / data.total) * 100) || 0;
                                            return (
                                                <div key={subj} className="flex flex-col lg:flex-row lg:items-center justify-between p-5 border border-slate-200 rounded-xl bg-white gap-4 shadow-sm">
                                                    <div className="flex-1">
                                                        <span className="text-[10px] font-black uppercase tracking-widest text-slate-400 block mb-1">{data.area}</span>
                                                        <h4 className="font-bold text-slate-700 leading-snug">{subj}</h4>
                                                    </div>
                                                    <div className="flex items-center gap-6 shrink-0">
                                                        <div className="text-center"><span className="text-[10px] uppercase font-bold text-green-600 block">Acertos</span><span className="font-black text-green-700 text-lg">{data.correct}</span></div>
                                                        <div className="text-center"><span className="text-[10px] uppercase font-bold text-red-600 block">Erros</span><span className="font-black text-red-700 text-lg">{data.wrong}</span></div>
                                                        <div className="w-24 text-right border-l border-slate-100 pl-4"><span className="text-[10px] uppercase font-bold text-blue-600 block">Desempenho</span><span className={`font-black text-2xl tracking-tighter ${pct >= 70 ? 'text-green-500' : pct >= 50 ? 'text-yellow-500' : 'text-red-500'}`}>{pct}%</span></div>
                                                    </div>
                                                </div>
                                            )
                                        })}
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                );
            };

            // ---- CADERNO DE ERROS ----
            const CadernoErros = () => {
                const redCount = errorQuestions.filter(q => cadernoStatus[q.id] === 'red').length;
                const yellowCount = errorQuestions.filter(q => cadernoStatus[q.id] === 'yellow').length;

                return (
                    <div className="max-w-4xl mx-auto p-4 md:p-8 animate-in slide-in-from-bottom-4">
                        <button onClick={() => setScreen('dashboard')} className="text-slate-500 font-bold mb-6 hover:text-slate-800 flex items-center gap-2">← Voltar</button>
                        
                        <div className="bg-white p-8 rounded-[2.5rem] border border-slate-200 shadow-sm">
                            <div className="flex items-center gap-4 mb-6">
                                <div className="p-4 bg-red-100 text-red-600 rounded-2xl"><Icons.BookX /></div>
                                <div><h1 className="text-2xl font-black text-slate-800">Caderno de Erros</h1><p className="text-slate-500 font-medium">Acerte 2 vezes seguidas para remover a questão.</p></div>
                            </div>
                            <div className="flex gap-4 mb-8">
                                <div className="flex-1 bg-red-50 border border-red-100 p-4 rounded-2xl"><span className="text-red-600 font-black text-3xl block">{redCount}</span><span className="text-red-800 text-xs font-bold uppercase">Nunca Acertou</span></div>
                                <div className="flex-1 bg-yellow-50 border border-yellow-100 p-4 rounded-2xl"><span className="text-yellow-600 font-black text-3xl block">{yellowCount}</span><span className="text-yellow-800 text-xs font-bold uppercase">Acertou 1x (Falta 1)</span></div>
                            </div>
                            {errorQuestions.length > 0 ? (
                                <button onClick={() => startQuiz(errorQuestions, "Revisão do Caderno", "study")} className="w-full py-4 bg-slate-900 text-white font-black rounded-xl hover:bg-slate-800 transition shadow-lg">🔄 REVISAR TODAS ({errorQuestions.length})</button>
                            ) : (<div className="text-center p-8 bg-green-50 rounded-2xl text-green-700 font-bold">Seu caderno está vazio! 🎉</div>)}
                        </div>
                    </div>
                );
            };

            // ---- TELA DO QUIZ ----
            const Quiz = () => {
                const currentQ = quizConfig.questions[idx];
                const theme = getTheme(currentQ?.area);
                const sessionAns = sessionAnswers[currentQ?.id];
                const isAnswered = !!sessionAns;
                const isCorrect = sessionAns === currentQ?.correct;

                if (!currentQ) return <div className="p-8 text-center text-slate-500">Falha ao carregar a questão.</div>;

                return (
                    <div className="max-w-4xl mx-auto p-4 md:p-6 pb-24 animate-in slide-in-from-right">
                        <header className="flex justify-between items-center mb-6">
                            <button onClick={() => setScreen('dashboard')} className="text-slate-500 font-bold hover:text-slate-800">← Sair</button>
                            <span className="font-black text-slate-800 uppercase tracking-widest text-[10px] md:text-xs text-center truncate max-w-[200px] md:max-w-[400px]">{quizConfig.title}</span>
                            <span className="font-mono text-slate-500 bg-white px-3 py-1 rounded-lg border border-slate-200 shadow-sm">{idx + 1} / {quizConfig.questions.length}</span>
                        </header>

                        <div className="bg-white rounded-[2.5rem] border border-slate-200 shadow-sm overflow-hidden mb-6">
                            <div className="h-1.5 w-full bg-slate-100"><div className={`h-full ${theme.bar} transition-all duration-300`} style={{width: `${((idx+1)/quizConfig.questions.length)*100}%`}}></div></div>

                            <div className="p-6 md:p-10">
                                <div className="flex justify-between items-start mb-6">
                                    <div className="flex gap-2 items-center flex-wrap">
                                        <span className={`text-[10px] font-black uppercase tracking-widest px-3 py-1 rounded-lg ${theme.bg} ${theme.text}`}>{currentQ.area}</span>
                                    </div>
                                    <button onClick={() => toggleFlag(currentQ.id)} className={`transition ${flagged.includes(currentQ.id) ? "text-yellow-500" : "text-slate-200 hover:text-slate-400"}`}>
                                        <Icons.Star filled={flagged.includes(currentQ.id)} />
                                    </button>
                                </div>
                                <h2 className="text-xl md:text-2xl font-bold text-slate-800 mb-8 leading-relaxed">{currentQ.text}</h2>
                                <div className="space-y-4">
                                    {Object.entries(currentQ.options).map(([k, v]) => {
                                        const isSel = sessionAns === k;
                                        const isRightObj = currentQ.correct === k;
                                        let btnClass = "w-full text-left p-5 rounded-2xl border-2 transition-all flex gap-4 items-start group ";
                                        let iconClass = "w-8 h-8 rounded-xl flex items-center justify-center font-black text-sm flex-shrink-0 border-2 transition-colors ";

                                        if (!isAnswered) {
                                            btnClass += "border-slate-100 hover:border-slate-300 bg-white cursor-pointer";
                                            iconClass += "border-slate-200 text-slate-400 bg-slate-50";
                                        } else {
                                            if (isRightObj) {
                                                btnClass += "border-green-500 bg-green-50";
                                                iconClass += "border-green-500 bg-green-500 text-white";
                                            } else if (isSel && !isRightObj) {
                                                btnClass += "border-red-500 bg-red-50";
                                                iconClass += "border-red-500 bg-red-500 text-white";
                                            } else {
                                                btnClass += "border-slate-100 opacity-40 cursor-not-allowed";
                                                iconClass += "border-slate-200 text-slate-300 bg-slate-50";
                                            }
                                        }
                                        return (
                                            <button key={k} onClick={() => handleAnswer(currentQ.id, k)} disabled={isAnswered} className={btnClass}>
                                                <div className={iconClass}>{k}</div>
                                                <span className={`pt-1 font-medium ${isAnswered && isRightObj ? 'text-green-900' : 'text-slate-700'}`}>{v}</span>
                                            </button>
                                        );
                                    })}
                                </div>
                            </div>

                            {isAnswered && (
                                <div className={`border-t-2 ${isCorrect ? 'border-green-200 bg-green-50' : 'border-red-200 bg-red-50'} p-6 md:p-10 animate-in slide-in-from-bottom-2`}>
                                    <h3 className={`text-xl font-black mb-4 flex items-center gap-2 ${isCorrect ? 'text-green-700' : 'text-red-700'}`}>
                                        {isCorrect ? "✅ EXCELENTE! VOCÊ ACERTOU." : "❌ RESPOSTA INCORRETA"}
                                    </h3>
                                    {!isCorrect && (<div className="bg-white p-4 rounded-xl border border-red-100 mb-6"><span className="text-green-700 font-bold">✅ GABARITO CORRETO: {currentQ.correct}</span></div>)}
                                    <div className="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm"><span className="font-black uppercase tracking-widest text-[10px] text-slate-400 block mb-2">📖 Explicação do Professor</span><p className="whitespace-pre-line text-slate-700">{currentQ.explanation}</p></div>
                                </div>
                            )}
                        </div>

                        <div className="flex justify-between items-center fixed bottom-0 left-0 right-0 p-4 bg-white border-t border-slate-200 z-50 md:relative md:bg-transparent md:border-0 md:p-0">
                            <button onClick={() => setIdx(i => Math.max(0, i-1))} disabled={idx === 0} className="px-6 py-3 font-bold text-slate-500 hover:bg-slate-100 rounded-xl disabled:opacity-30">Voltar</button>
                            {isAnswered && idx < quizConfig.questions.length - 1 ? (
                                <button onClick={() => setIdx(i => i + 1)} className={`px-8 py-3 ${theme.highlight} text-white font-black rounded-xl hover:opacity-90 shadow-lg`}>Próxima Questão →</button>
                            ) : (!isAnswered || idx === quizConfig.questions.length - 1) ? (
                                <button onClick={() => { if(idx === quizConfig.questions.length - 1) setScreen('dashboard'); else setIdx(i => i+1); }} disabled={!isAnswered && idx < quizConfig.questions.length - 1} className="px-6 py-3 bg-slate-900 text-white font-bold rounded-xl hover:bg-slate-800 disabled:opacity-30">{idx === quizConfig.questions.length - 1 ? 'Concluir' : 'Pular'}</button>
                            ) : null}
                        </div>
                    </div>
                );
            };

            return <div>
                {screen === 'dashboard' && <Dashboard />}
                {screen === 'estatisticas' && <Estatisticas />}
                {screen === 'caderno' && <CadernoErros />}
                {screen === 'quiz' && <Quiz />}
            </div>;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
