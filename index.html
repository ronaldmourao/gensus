<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genoma SUS - Diagnóstico de Guerra</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="banco.js"></script>
    <style>body { font-family: 'Inter', sans-serif; } .hide-scrollbar::-webkit-scrollbar { display: none; }</style>
</head>
<body class="bg-[#f1f5f9] text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSunO3dVP4m3_zA1WIBxLQCMDvwPD2gqJTX0DbyYCvR21DnDO2kNeJSLKgmOaIfRXWKFo5asfzR6SM5/pub?output=csv";

        const Icons = {
            Trophy: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17"/><path d="M14 14.66V17"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>,
            User: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>,
            Target: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>,
            Refresh: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
        };

        const App = () => {
            const [currentUser, setCurrentUser] = useState(() => localStorage.getItem('genomasus_active_user'));
            const [userList, setUserList] = useState(() => JSON.parse(localStorage.getItem('genomasus_user_list') || "[]"));
            const [screen, setScreen] = useState('dashboard');
            const [quizConfig, setQuizConfig] = useState({ questions: [], title: "" });
            const [idx, setIdx] = useState(0);
            const [history, setHistory] = useState({});
            const [sessionAnswers, setSessionAnswers] = useState({});
            const [syncing, setSyncing] = useState(false);

            const activeBank = useMemo(() => window.questionBank || [], []);

            const syncFromCloud = async (userName) => {
                if (!CSV_URL) return;
                setSyncing(true);
                try {
                    const response = await fetch(CSV_URL + "&t=" + new Date().getTime());
                    const text = await response.text();
                    const rows = text.split('\n').map(row => row.split(','));
                    const newHistory = {};
                    rows.slice(1).forEach(row => {
                        const rowUser = row[1]?.replace(/"/g, '').trim().toLowerCase();
                        const rowId = parseInt(row[2]?.replace(/"/g, ''));
                        const rowStatus = row[3]?.replace(/"/g, '').trim();
                        if (rowUser === userName.toLowerCase() && !isNaN(rowId)) {
                            if (!newHistory[rowId]) newHistory[rowId] = [];
                            newHistory[rowId].push({ isCorrect: rowStatus === "ACERTO", date: row[0] });
                        }
                    });
                    setHistory(newHistory);
                } catch (e) { console.error(e); } finally { setSyncing(false); }
            };

            useEffect(() => {
                if (currentUser) {
                    syncFromCloud(currentUser);
                    if (!userList.includes(currentUser)) {
                        const newList = [...userList, currentUser];
                        setUserList(newList);
                        localStorage.setItem('genomasus_user_list', JSON.stringify(newList));
                    }
                }
            }, [currentUser]);

            const handleAnswer = (qId, option) => {
                if (sessionAnswers[qId]) return;
                const question = activeBank.find(q => q.id === qId);
                const isCorrect = question.correct === option;
                const statusText = isCorrect ? "ACERTO" : "ERRO";

                setSessionAnswers(prev => ({ ...prev, [qId]: option }));
                setHistory(prev => {
                    const qHist = prev[qId] || [];
                    return { ...prev, [qId]: [...qHist, { isCorrect, date: new Date().toISOString() }] };
                });

                const formID = "1FAIpQLSdLep-1NlhMCXeeGEVjZPXh-unPvuSkwqkNvfAuYwyCPDKzSw";
                const formData = new URLSearchParams();
                formData.append("entry.369347060", currentUser);
                formData.append("entry.455774683", qId);
                formData.append("entry.1700459455", statusText);
                fetch(`https://docs.google.com/forms/d/e/${formID}/formResponse`, { method: 'POST', mode: 'no-cors', body: formData });
            };

            const startQuiz = (qs, title) => {
                if (qs.length === 0) return alert("Nenhuma questão encontrada com este filtro.");
                setQuizConfig({ questions: qs.sort(() => 0.5 - Math.random()), title });
                setSessionAnswers({});
                setIdx(0);
                setScreen('quiz');
            };

            // --- LÓGICA DO DIAGNÓSTICO ---
            const subjectsData = useMemo(() => {
                const map = {};
                activeBank.forEach(q => {
                    if (!map[q.subject]) map[q.subject] = { total: 0, attempted: 0, correct: 0, area: q.area, questions: [] };
                    map[q.subject].total++;
                    map[q.subject].questions.push(q);
                    const h = history[q.id];
                    if (h && h.length > 0) {
                        map[q.subject].attempted++;
                        if (h[h.length - 1].isCorrect) map[q.subject].correct++;
                    }
                });
                return map;
            }, [history, activeBank]);

            if (!currentUser) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6">
                        <div className="bg-white p-8 rounded-[2rem] shadow-xl w-full max-w-sm text-center">
                            <h1 className="text-2xl font-black mb-6">Genoma SUS Login</h1>
                            <div className="space-y-2 mb-6">
                                {userList.map(u => (
                                    <button key={u} onClick={() => setCurrentUser(u)} className="w-full p-4 rounded-xl bg-slate-50 font-bold capitalize hover:bg-blue-50 border border-transparent hover:border-blue-200 transition-all">{u}</button>
                                ))}
                            </div>
                            <input id="newU" className="w-full p-4 rounded-xl border-2 mb-2 font-bold" placeholder="Novo nome..." />
                            <button onClick={() => {const val = document.getElementById('newU').value; if(val) setCurrentUser(val.toLowerCase());}} className="w-full py-4 bg-blue-600 text-white font-black rounded-xl">Entrar</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="max-w-6xl mx-auto p-4 md:p-8">
                    {screen === 'dashboard' && (
                        <div className="animate-in fade-in duration-500">
                            <div className="flex justify-between items-center mb-8">
                                <div className="flex items-center gap-2">
                                    <Icons.Trophy />
                                    <h1 className="text-xl font-black">DIAGNÓSTICO DE GUERRA</h1>
                                </div>
                                <div className="flex items-center gap-4">
                                    {syncing && <span className="text-[10px] font-black text-blue-500 animate-pulse">SYNC NUVEM...</span>}
                                    <button onClick={() => {localStorage.removeItem('genomasus_active_user'); setCurrentUser(null);}} className="text-xs font-bold text-slate-400 hover:text-red-500 capitalize">Sair ({currentUser})</button>
                                </div>
                            </div>

                            <div className="grid grid-cols-1 gap-4">
                                {Object.entries(subjectsData).map(([name, data]) => {
                                    const coverage = Math.round((data.attempted / data.total) * 100);
                                    const accuracy = data.attempted > 0 ? Math.round((data.correct / data.attempted) * 100) : 0;
                                    
                                    return (
                                        <div key={name} className="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 flex flex-col md:flex-row md:items-center gap-6">
                                            <div className="flex-1">
                                                <span className="text-[9px] font-black uppercase text-slate-400 tracking-widest">{data.area}</span>
                                                <h3 className="font-bold text-slate-800 leading-tight mb-2">{name}</h3>
                                                <div className="flex gap-4">
                                                    <div className="flex flex-col">
                                                        <span className="text-[10px] font-bold text-slate-400 uppercase">Cobertura</span>
                                                        <span className={`text-sm font-black ${coverage > 80 ? 'text-green-500' : 'text-orange-500'}`}>{coverage}%</span>
                                                    </div>
                                                    <div className="flex flex-col">
                                                        <span className="text-[10px] font-bold text-slate-400 uppercase">Acerto</span>
                                                        <span className={`text-sm font-black ${accuracy > 70 ? 'text-blue-500' : 'text-red-500'}`}>{accuracy}%</span>
                                                    </div>
                                                </div>
                                            </div>
                                            
                                            <div className="flex flex-wrap gap-2">
                                                <button onClick={() => startQuiz(data.questions.filter(q => !history[q.id]), "Inéditas: " + name)} className="px-4 py-2 bg-slate-900 text-white text-[10px] font-black rounded-lg hover:bg-slate-700">INÉDITAS</button>
                                                <button onClick={() => startQuiz(data.questions.filter(q => history[q.id] && !history[q.id][history[q.id].length-1].isCorrect), "Revisar Erros: " + name)} className="px-4 py-2 bg-red-100 text-red-600 text-[10px] font-black rounded-lg hover:bg-red-200">SÓ ERROS</button>
                                                <button onClick={() => startQuiz(data.questions, "Revisão Total: " + name)} className="px-4 py-2 bg-blue-50 text-blue-600 text-[10px] font-black rounded-lg hover:bg-blue-100">REVISAR TUDO</button>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    )}

                    {screen === 'quiz' && (
                        <div className="max-w-3xl mx-auto animate-in slide-in-from-right duration-300">
                            <div className="flex justify-between items-center mb-6">
                                <button onClick={() => setScreen('dashboard')} className="text-sm font-bold text-slate-400">← Voltar</button>
                                <span className="text-[10px] font-black uppercase text-slate-400">{quizConfig.title}</span>
                                <span className="text-sm font-bold">{idx + 1} / {quizConfig.questions.length}</span>
                            </div>

                            {quizConfig.questions[idx] && (
                                <div className="bg-white rounded-[2.5rem] shadow-xl border border-slate-200 overflow-hidden">
                                    <div className="p-8 md:p-12">
                                        <h2 className="text-xl font-bold mb-8 leading-relaxed text-slate-800">{quizConfig.questions[idx].text}</h2>
                                        <div className="space-y-3">
                                            {Object.entries(quizConfig.questions[idx].options).map(([k, v]) => {
                                                const sel = sessionAnswers[quizConfig.questions[idx].id] === k;
                                                const correct = quizConfig.questions[idx].correct === k;
                                                const answered = !!sessionAnswers[quizConfig.questions[idx].id];
                                                
                                                let btnStyle = "w-full text-left p-4 rounded-xl border-2 transition-all flex gap-4 ";
                                                if (!answered) btnStyle += "border-slate-100 hover:border-blue-200 hover:bg-blue-50";
                                                else if (correct) btnStyle += "border-green-500 bg-green-50";
                                                else if (sel) btnStyle += "border-red-500 bg-red-50";
                                                else btnStyle += "border-slate-50 opacity-40";

                                                return (
                                                    <button key={k} onClick={() => handleAnswer(quizConfig.questions[idx].id, k)} disabled={answered} className={btnStyle}>
                                                        <span className="font-black text-blue-600">{k}</span>
                                                        <span className="font-medium text-slate-700">{v}</span>
                                                    </button>
                                                );
                                            })}
                                        </div>
                                    </div>
                                    {sessionAnswers[quizConfig.questions[idx].id] && (
                                        <div className="p-8 bg-slate-50 border-t border-slate-100">
                                            <p className="text-sm text-slate-600 italic leading-relaxed mb-6">{quizConfig.questions[idx].explanation}</p>
                                            <button onClick={() => { if(idx < quizConfig.questions.length - 1) setIdx(i=>i+1); else setScreen('dashboard'); }} className="w-full py-4 bg-slate-900 text-white font-black rounded-xl">PRÓXIMA</button>
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
