<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genoma SUS - Dashboard Oficial</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="banco.js"></script>
    <style>body { font-family: 'Inter', sans-serif; } .hide-scrollbar::-webkit-scrollbar { display: none; }</style>
</head>
<body class="bg-[#f8fafc] text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSunO3dVP4m3_zA1WIBxLQCMDvwPD2gqJTX0DbyYCvR21DnDO2kNeJSLKgmOaIfRXWKFo5asfzR6SM5/pub?output=csv";

        const Icons = {
            Trophy: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>,
            User: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>,
            LogOut: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>,
            BookX: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/><line x1="9" y1="8" x2="15" y2="14"/><line x1="15" y1="8" x2="9" y2="14"/></svg>,
            BarChart: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></svg>,
            Play: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        };

        const themeColors = {
            "Laboratório": { bg: "bg-emerald-50", text: "text-emerald-700", border: "border-emerald-200", bar: "bg-emerald-500", highlight: "bg-emerald-600" },
            "Bioinformática": { bg: "bg-blue-50", text: "text-blue-700", border: "border-blue-200", bar: "bg-blue-500", highlight: "bg-blue-600" }
        };

        const editalSyllabus = {
            "Laboratório": ["Biologia, biologia molecular e genética", "Tecnologias laboratoriais em genômica (sequenciamento de nova geração - NGS, extração de DNA genômico, controle de qualidade, preparo de amostras)", "Boas Práticas de Laboratório (BPL), biossegurança e controle de qualidade", "Ética em pesquisa e noções de estudos multicêntricos", "Noções de saúde pública e ética em pesquisa"],
            "Bioinformática": ["Bioinformática e análise genômica", "Programação e ferramentas computacionais", "Estatística aplicada à genômica", "Princípios de saúde pública e epidemiologia genética", "Segurança de dados", "Genética de populações", "Vocabulários controlados, ontologias e técnicas de extração, transformação e carga de dados (ETL)"]
        };

        const App = () => {
            const [currentUser, setCurrentUser] = useState(() => localStorage.getItem('genomasus_active_user'));
            const [userList, setUserList] = useState(() => JSON.parse(localStorage.getItem('genomasus_user_list') || "[]"));
            const [screen, setScreen] = useState('dashboard');
            const [quizConfig, setQuizConfig] = useState({ questions: [], title: "" });
            const [idx, setIdx] = useState(0);
            const [history, setHistory] = useState({});
            const [sessionAnswers, setSessionAnswers] = useState({});
            const [isSyncing, setIsSyncing] = useState(false);

            const activeBank = useMemo(() => window.questionBank || [], []);

            const syncFromCloud = async (userName) => {
                if (!CSV_URL) return;
                setIsSyncing(true);
                try {
                    const response = await fetch(CSV_URL + "&t=" + new Date().getTime());
                    const text = await response.text();
                    const rows = text.split('\n').map(row => row.split(','));
                    const newHistory = {};
                    rows.slice(1).forEach(row => {
                        const rowUser = row[1]?.replace(/"/g, '').trim().toLowerCase();
                        const rowId = parseInt(row[2]?.replace(/"/g, ''));
                        const rowStatus = row[3]?.replace(/"/g, '').trim();
                        if (rowUser === userName.toLowerCase() && !isNaN(rowId)) {
                            if (!newHistory[rowId]) newHistory[rowId] = [];
                            newHistory[rowId].push({ isCorrect: rowStatus === "ACERTO", date: row[0] });
                        }
                    });
                    setHistory(newHistory);
                } catch (e) { console.error(e); } finally { setIsSyncing(false); }
            };

            useEffect(() => {
                if (currentUser) {
                    syncFromCloud(currentUser);
                    if (!userList.includes(currentUser)) {
                        const newList = [...userList, currentUser];
                        setUserList(newList);
                        localStorage.setItem('genomasus_user_list', JSON.stringify(newList));
                    }
                }
            }, [currentUser]);

            const handleAnswer = (qId, option) => {
                if (sessionAnswers[qId]) return;
                const question = activeBank.find(q => q.id === qId);
                const isCorrect = question.correct === option;
                const statusText = isCorrect ? "ACERTO" : "ERRO";

                setSessionAnswers(prev => ({ ...prev, [qId]: option }));
                setHistory(prev => {
                    const qHist = prev[qId] || [];
                    return { ...prev, [qId]: [...qHist, { isCorrect, date: new Date().toISOString() }] };
                });

                const formID = "1FAIpQLSdLep-1NlhMCXeeGEVjZPXh-unPvuSkwqkNvfAuYwyCPDKzSw";
                const formData = new URLSearchParams();
                formData.append("entry.369347060", currentUser);
                formData.append("entry.455774683", qId);
                formData.append("entry.1700459455", statusText);
                fetch(`https://docs.google.com/forms/d/e/${formID}/formResponse`, { method: 'POST', mode: 'no-cors', body: formData });
            };

            const startQuiz = (qs, title) => {
                if (qs.length === 0) return alert("Nenhuma questão disponível.");
                setQuizConfig({ questions: qs.sort(() => 0.5 - Math.random()), title });
                setSessionAnswers({});
                setIdx(0);
                setScreen('quiz');
            };

            const cadernoStatus = useMemo(() => {
                const status = {};
                Object.keys(history).forEach(qId => {
                    const att = history[qId];
                    if (!att || att.length === 0) return;
                    const last = att[att.length - 1];
                    const prev = att.length > 1 ? att[att.length - 2] : null;
                    if (!last.isCorrect) status[qId] = "red";
                    else if (last.isCorrect && (!prev || !prev.isCorrect)) status[qId] = "yellow";
                    else status[qId] = "green";
                });
                return status;
            }, [history]);

            const subjectsData = useMemo(() => {
                const map = {};
                activeBank.forEach(q => {
                    if (!map[q.subject]) map[q.subject] = { total: 0, attempted: 0, correct: 0, area: q.area, questions: [] };
                    map[q.subject].total++;
                    map[q.subject].questions.push(q);
                    const h = history[q.id];
                    if (h && h.length > 0) {
                        map[q.subject].attempted++;
                        if (h[h.length - 1].isCorrect) map[q.subject].correct++;
                    }
                });
                return map;
            }, [history, activeBank]);

            if (!currentUser) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6">
                        <div className="bg-white p-10 rounded-[3rem] shadow-2xl w-full max-w-md">
                            <h1 className="text-3xl font-black text-center mb-8">Genoma SUS</h1>
                            <div className="space-y-3 mb-6">
                                {userList.map(u => (
                                    <button key={u} onClick={() => setCurrentUser(u)} className="w-full p-4 rounded-2xl bg-slate-50 font-bold capitalize hover:bg-blue-50 border-2 border-transparent hover:border-blue-200 transition-all">{u}</button>
                                ))}
                            </div>
                            <input id="newU" className="w-full p-4 rounded-2xl border-2 mb-4 font-bold" placeholder="Novo usuário..." />
                            <button onClick={() => {const val = document.getElementById('newU').value; if(val) setCurrentUser(val.toLowerCase());}} className="w-full py-4 bg-blue-600 text-white font-black rounded-2xl">Acessar</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen pb-10">
                    {screen === 'dashboard' && (
                        <div className="max-w-7xl mx-auto p-4 md:p-8 animate-in fade-in">
                            <div className="flex justify-between items-center mb-8">
                                <div className="flex items-center gap-3">
                                    <Icons.Trophy />
                                    <h1 className="text-xl font-black tracking-tighter">GENOMA SUS</h1>
                                </div>
                                <div className="flex items-center gap-3 bg-white px-4 py-2 rounded-full border shadow-sm">
                                    <span className="text-sm font-bold capitalize">Olá, <span className="text-blue-600">{currentUser}</span></span>
                                    <button onClick={handleLogout} className="text-slate-300 hover:text-red-500"><Icons.LogOut /></button>
                                </div>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10">
                                <button onClick={() => setScreen('caderno')} className="bg-white border rounded-[2rem] p-6 transition-all flex justify-between items-center shadow-sm group hover:border-red-200">
                                    <div className="flex items-center gap-4">
                                        <div className="p-3 bg-red-500 text-white rounded-xl shadow-lg"><Icons.BookX /></div>
                                        <div className="text-left">
                                            <h2 className="text-xl font-black">Caderno de Erros</h2>
                                            <p className="text-slate-500">{activeBank.filter(q => cadernoStatus[q.id] === 'red' || cadernoStatus[q.id] === 'yellow').length} revisões</p>
                                        </div>
                                    </div>
                                </button>
                                <button onClick={() => setScreen('estatisticas')} className="bg-white border rounded-[2rem] p-6 transition-all flex justify-between items-center shadow-sm group hover:border-blue-200">
                                    <div className="flex items-center gap-4">
                                        <div className="p-3 bg-blue-500 text-white rounded-xl shadow-lg"><Icons.BarChart /></div>
                                        <div className="text-left">
                                            <h2 className="text-xl font-black">Estatísticas</h2>
                                            <p className="text-slate-500">Diagnóstico de Guerra</p>
                                        </div>
                                    </div>
                                </button>
                            </div>

                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                                {Object.entries(editalSyllabus).map(([area, subjects]) => {
                                    const theme = themeColors[area];
                                    const areaQs = activeBank.filter(q => q.area === area);
                                    return (
                                        <div key={area} className="bg-white rounded-[2.5rem] border shadow-sm overflow-hidden flex flex-col">
                                            <div className={`${theme.bg} p-6 border-b ${theme.border} flex justify-between items-center`}>
                                                <h2 className={`text-xl font-black ${theme.text} uppercase`}>{area}</h2>
                                                <button onClick={() => startQuiz(areaQs, area)} className={`px-4 py-2 ${theme.highlight} text-white font-bold rounded-xl shadow-md flex items-center gap-2 hover:opacity-90 transition-all`}><Icons.Play /> Iniciar Geral</button>
                                            </div>
                                            <div className="p-2">
                                                {subjects.map(subj => {
                                                    const subQs = activeBank.filter(q => q.subject === subj && q.area === area);
                                                    return (
                                                        <div key={subj} className="flex items-center justify-between p-4 hover:bg-slate-50 rounded-2xl transition group">
                                                            <div className="flex-1 pr-4"><h4 className="text-sm font-bold text-slate-700 leading-tight">{subj}</h4></div>
                                                            <button onClick={() => startQuiz(subQs, subj)} className="bg-slate-900 text-white px-4 py-2 rounded-xl text-[10px] font-black opacity-0 group-hover:opacity-100 transition-all">ESTUDAR</button>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    )}

                    {screen === 'estatisticas' && (
                        <div className="max-w-6xl mx-auto p-4 md:p-8 animate-in slide-in-from-bottom-4">
                            <button onClick={() => setScreen('dashboard')} className="mb-6 font-bold text-slate-400">← Voltar ao Início</button>
                            <div className="bg-white p-8 rounded-[2.5rem] shadow-xl border mb-10">
                                <h2 className="text-3xl font-black mb-2">Desempenho: <span className="capitalize text-blue-600">{currentUser}</span></h2>
                                <p className="text-slate-500 font-medium mb-8">Diagnóstico analítico de cobertura do edital.</p>
                                <div className="space-y-4">
                                    {Object.entries(subjectsData).map(([name, data]) => {
                                        const coverage = Math.round((data.attempted / data.total) * 100);
                                        const accuracy = data.attempted > 0 ? Math.round((data.correct / data.attempted) * 100) : 0;
                                        return (
                                            <div key={name} className="p-5 border rounded-2xl flex flex-col md:flex-row md:items-center gap-6">
                                                <div className="flex-1">
                                                    <h3 className="font-bold text-slate-800 leading-tight mb-2">{name}</h3>
                                                    <div className="flex gap-6">
                                                        <div><span className="text-[10px] font-bold text-slate-400 uppercase block">Cobertura</span><span className="font-black text-slate-800">{coverage}%</span></div>
                                                        <div><span className="text-[10px] font-bold text-slate-400 uppercase block">Precisão</span><span className="font-black text-blue-600">{accuracy}%</span></div>
                                                    </div>
                                                </div>
                                                <div className="flex gap-2">
                                                    <button onClick={() => startQuiz(data.questions.filter(q => !history[q.id]), "Inéditas: " + name)} className="px-4 py-2 bg-slate-900 text-white text-[10px] font-black rounded-lg">SÓ INÉDITAS</button>
                                                    <button onClick={() => startQuiz(data.questions.filter(q => history[q.id] && !history[q.id][history[q.id].length-1].isCorrect), "Revisar Erros: " + name)} className="px-4 py-2 bg-red-100 text-red-600 text-[10px] font-black rounded-lg">SÓ ERROS</button>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>
                    )}

                    {screen === 'caderno' && (
                        <div className="max-w-4xl mx-auto p-8 animate-in slide-in-from-bottom-4">
                            <button onClick={() => setScreen('dashboard')} className="mb-6 font-bold text-slate-400">← Voltar</button>
                            <div className="bg-white p-10 rounded-[3rem] border text-center shadow-xl">
                                <div className="w-20 h-20 bg-red-100 text-red-600 rounded-3xl flex items-center justify-center mx-auto mb-6"><Icons.BookX /></div>
                                <h2 className="text-3xl font-black mb-2">Revisão de Erros</h2>
                                <p className="text-slate-500 mb-8 italic">Você tem {activeBank.filter(q => cadernoStatus[q.id] === 'red' || cadernoStatus[q.id] === 'yellow').length} questões pendentes.</p>
                                <button onClick={() => startQuiz(activeBank.filter(q => cadernoStatus[q.id] === 'red' || cadernoStatus[q.id] === 'yellow'), "Revisão Geral")} className="w-full py-5 bg-red-600 text-white font-black rounded-2xl shadow-xl">RESOLVER CADERNO</button>
                            </div>
                        </div>
                    )}

                    {screen === 'quiz' && (
                        <div className="max-w-3xl mx-auto p-4 md:p-10 animate-in slide-in-from-right">
                            <div className="flex justify-between items-center mb-6">
                                <button onClick={() => setScreen('dashboard')} className="text-sm font-bold text-slate-400">← Parar</button>
                                <span className="text-[10px] font-black uppercase text-slate-400">{quizConfig.title}</span>
                                <span className="text-sm font-bold">{idx + 1} / {quizConfig.questions.length}</span>
                            </div>
                            <div className="bg-white rounded-[3rem] shadow-xl border overflow-hidden">
                                <div className="p-8 md:p-12">
                                    <h2 className="text-xl md:text-2xl font-bold mb-10 text-slate-800 leading-relaxed">{quizConfig.questions[idx].text}</h2>
                                    <div className="space-y-3">
                                        {Object.entries(quizConfig.questions[idx].options).map(([k, v]) => {
                                            const answered = !!sessionAnswers[quizConfig.questions[idx].id];
                                            const isCorrect = quizConfig.questions[idx].correct === k;
                                            const isSel = sessionAnswers[quizConfig.questions[idx].id] === k;
                                            let s = "w-full text-left p-5 rounded-2xl border-2 transition-all flex gap-4 ";
                                            if(!answered) s += "border-slate-100 hover:border-blue-200 hover:bg-blue-50";
                                            else if(isCorrect) s += "border-green-500 bg-green-50";
                                            else if(isSel) s += "border-red-500 bg-red-50";
                                            else s += "border-slate-50 opacity-40";
                                            return <button key={k} onClick={() => handleAnswer(quizConfig.questions[idx].id, k)} disabled={answered} className={s}><span className="font-black text-blue-600">{k}</span><span className="font-medium text-slate-700">{v}</span></button>;
                                        })}
                                    </div>
                                </div>
                                {sessionAnswers[quizConfig.questions[idx].id] && (
                                    <div className="p-8 bg-slate-50 border-t">
                                        <p className="text-slate-600 leading-relaxed mb-8">{quizConfig.questions[idx].explanation}</p>
                                        <button onClick={() => { if(idx < quizConfig.questions.length-1) setIdx(i=>i+1); else setScreen('dashboard'); }} className="w-full py-5 bg-slate-900 text-white font-black rounded-2xl shadow-lg">PRÓXIMA</button>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
